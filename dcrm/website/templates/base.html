{% load static %}
<!--#region encabezados-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django✨</title>
    <link href="{% static 'css/bootstrap.min.css'%}" rel="stylesheet">
    <style>
        :root {
            --sys-bg: #f5f5f5;
            --sys-surface: #ffffff;
            --sys-text: #111111;
            --sys-muted: #6b7280;
            --sys-border: #e5e7eb;
            --sys-shadow: 0 10px 24px rgba(0, 0, 0, 0.06);
        }

        body {
            background: var(--sys-bg);
            color: var(--sys-text);
        }

        .card,
        .table,
        .dropdown-menu,
        .modal-content {
            border-color: var(--sys-border) !important;
        }

        .card {
            background: var(--sys-surface);
            box-shadow: var(--sys-shadow);
        }

        .text-muted {
            color: var(--sys-muted) !important;
        }

        .btn-primary,
        .btn-success,
        .btn-dark {
            background-color: #111111 !important;
            border-color: #111111 !important;
            color: #ffffff !important;
        }

        .btn-primary:hover,
        .btn-success:hover,
        .btn-dark:hover {
            background-color: #2a2a2a !important;
            border-color: #2a2a2a !important;
        }

        .btn-outline-dark,
        .btn-outline-danger,
        .btn-outline-primary {
            color: #111111 !important;
            border-color: #111111 !important;
        }

        .btn-outline-dark:hover,
        .btn-outline-danger:hover,
        .btn-outline-primary:hover {
            color: #ffffff !important;
            background: #111111 !important;
            border-color: #111111 !important;
        }

        .badge.bg-success,
        .badge.bg-primary,
        .badge.bg-secondary,
        .badge.bg-info,
        .badge.bg-warning,
        .badge.bg-danger {
            background: #222222 !important;
            color: #ffffff !important;
        }

        .table thead th {
            background: #f0f0f0 !important;
            color: #111111 !important;
        }

        .alert {
            border: 1px solid var(--sys-border);
            background: #ffffff;
            color: #111111;
        }
    </style>

</head>
<!--#endregion-->
<body>
    {% include 'navbar.html'%}
    <div class="container mt-4">
        <br>

        {%if messages%} {%for messages in messages%}
        <div class=" alert alert-warning alert-dismissible" role="alert">
                <strong>{{messages}}</strong>  Deberias revisar algunos de los campos , esta equivocado
                <button type="button" class ="btn-close" data-bs-dismiss="alert" arial-label ="Close">
                </button>
            </div>
            {%endfor%}
        {%endif%}
        {% block content %}
        {% endblock %}
    </div>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}" ></script>
</body>
</html>
